[package]
name = "qtss-worker"
version = "0.1.0"
edition.workspace = true
default-run = "qtss-worker"
license.workspace = true

[features]
default = []
plotters_ttf = ["qtss-ai/plotters_ttf"]

[dependencies]
qtss-common.workspace = true
qtss-binance.workspace = true
qtss-chart-patterns.workspace = true
qtss-range.workspace = true
qtss-storage.workspace = true
qtss-notify.workspace = true
qtss-nansen.workspace = true
qtss-domain.workspace = true
qtss-execution.workspace = true
qtss-reconcile.workspace = true
qtss-strategy.workspace = true
qtss-analysis.workspace = true
qtss-ai.workspace = true
qtss-pivots.workspace = true
qtss-regime.workspace = true
qtss-elliott.workspace = true
qtss-harmonic.workspace = true
qtss-engine.workspace = true
qtss-classical.workspace = true
qtss-gap.workspace = true
qtss-candles.workspace = true
qtss-tbm.workspace = true
qtss-onchain.workspace = true
qtss-indicators.workspace = true
qtss-eventbus = { path = "../qtss-eventbus" }
qtss-risk = { path = "../qtss-risk" }
qtss-config = { path = "../qtss-config" }
qtss-symbol-intel = { path = "../qtss-symbol-intel" }
dotenvy.workspace = true
sqlx.workspace = true
axum.workspace = true
serde.workspace = true
reqwest.workspace = true
chrono.workspace = true
serde_json.workspace = true
uuid.workspace = true
rust_decimal = { version = "1.36", features = ["serde"] }
tokio.workspace = true
async-trait.workspace = true
tracing.workspace = true
anyhow.workspace = true
futures-util.workspace = true
tokio-tungstenite.workspace = true
plotters = { version = "0.3.7", default-features = false, features = ["ab_glyph", "bitmap_backend", "bitmap_encoder", "image", "ttf"] }
tempfile = "3"
sha2 = { version = "0.10", default-features = false, features = ["std"] }
rand.workspace = true
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[[bin]]
name = "qtss-worker"
path = "src/main.rs"

[[bin]]
name = "symbol-catalog-refresh"
path = "src/bin/symbol_catalog_refresh.rs"

[[bin]]
name = "market-regime-tick"
path = "src/bin/market_regime_tick.rs"
