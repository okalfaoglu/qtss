# FAZ 9.6 / §0.1 / §2.2 madde 9 — CI: unit tests, Postgres migration smoke, web i18n + build.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo test (storage + notify + common + worker lib, no DB)
        run: |
          cargo test -p qtss-storage --lib
          cargo test -p qtss-notify --lib
          cargo test -p qtss-common --lib
          cargo test -p qtss-worker --lib
      - name: Cargo check (workspace binaries)
        run: cargo check -p qtss-api -p qtss-worker

  postgres-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: qtss
          POSTGRES_PASSWORD: qtss
          POSTGRES_DB: qtss
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U qtss -d qtss"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://qtss:qtss@localhost:5432/qtss
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Integration — migrations + worker system_config seeds
        run: cargo test -p qtss-storage --test migrations_apply -- --nocapture

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run i18n:check
      - run: npm run build
